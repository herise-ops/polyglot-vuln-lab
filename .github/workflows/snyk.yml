name: Snyk Security Scan

# ---------------------------------------------------------------------------
# PHASE MODEL
#
# DEV         -> pull_request into main. Fast feedback: SCA + SAST only,
#                hard gate (blocks merge via branch Ruleset).
# UAT         -> push to the `uat` branch. Full suite: SCA + SAST + Container
#                + IaC + DAST, hard gate.
# STAGING     -> push to the `staging` branch. Full suite again, gated behind
#                the `staging` GitHub Environment.
# PRODUCTION -> push to the `production` branch. Full suite again, gated
#                behind the `production` Environment — final human checkpoint.
# ---------------------------------------------------------------------------

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, uat, staging, production]
  schedule:
    - cron: "0 3 * * 1"   # weekly Monday scan, catches newly disclosed vulns

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ===========================================================================
  # DEV PHASE — runs on every PR into main. SCA + SAST only, for fast feedback.
  # ===========================================================================
  snyk-sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up runtimes for all detected ecosystems
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Scan every service directory (auto-detected by manifest file)
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e   # keep looping across services even if one fails; we fail the job at the end
          OVERALL_EXIT=0
          mkdir -p sarif-output

          for manifest in $(find . -maxdepth 2 \
              \( -name "package.json" -o -name "requirements.txt" \
                 -o -name "pom.xml" -o -name "build.gradle" \
                 -o -name "composer.json" -o -name "*.csproj" \) \
              -not -path "*/node_modules/*"); do

            dir=$(dirname "$manifest")
            service=$(basename "$dir")
            [ "$dir" = "." ] && service="root"

            echo "=================================================="
            echo "Scanning service: $service (in $dir)"
            echo "=================================================="

            pushd "$dir" > /dev/null

            case "$manifest" in
              *package.json)
                npm install --no-audit --no-fund
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *requirements.txt)
                pip install -r requirements.txt --break-system-packages --quiet
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *pom.xml)
                mvn install -DskipTests -q
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *build.gradle)
                gradle build -x test
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *composer.json)
                composer install --no-interaction
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *.csproj)
                dotnet restore
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
            esac

            EXIT_CODE=$?
            [ $EXIT_CODE -ne 0 ] && OVERALL_EXIT=1
            echo "Exit code for $service: $EXIT_CODE"

            popd > /dev/null
          done

          echo "overall_exit=$OVERALL_EXIT" >> "$GITHUB_OUTPUT"
          exit $OVERALL_EXIT

      - name: Upload SCA results per service to GitHub Code Scanning
        if: always()
        run: |
          for f in sarif-output/*.sarif; do
            [ -f "$f" ] && echo "Found: $f"
          done

      - name: Upload snyk-sca SARIF files
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-output
          category: snyk-sca

  snyk-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk Code
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif --severity-threshold=high

      - name: Upload Code results to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

  # ===========================================================================
  # UAT PHASE — runs on push to `uat`, `staging`, `production`. Adds Container,
  # IaC, and DAST (Ephemeral Stack via Compose + Snyk Agent) on top of SCA/SAST.
  # ===========================================================================
  snyk-container:
    if: github.ref_name == 'uat' || github.ref_name == 'staging' || github.ref_name == 'production'
    needs: [snyk-sca, snyk-code]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found — skipping container scan."
          fi

      - name: Build image
        if: steps.check_dockerfile.outputs.found == 'true'
        run: docker build -t myapp:${{ github.sha }} .

      - name: Run Snyk Container
        if: steps.check_dockerfile.outputs.found == 'true'
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: myapp:${{ github.sha }}
          args: --sarif-file-output=snyk-container.sarif --severity-threshold=high

      - name: Patch invalid security-severity values in SARIF
        if: steps.check_dockerfile.outputs.found == 'true' && always()
        run: |
          if [ -f "snyk-container.sarif" ]; then
            jq 'del(.. | objects | .["security-severity"]?)' snyk-container.sarif > snyk-container-fixed.sarif
            mv snyk-container-fixed.sarif snyk-container.sarif
          fi

      - name: Upload Container results to GitHub Code Scanning
        if: steps.check_dockerfile.outputs.found == 'true' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container

  snyk-iac:
    if: github.ref_name == 'uat' || github.ref_name == 'staging' || github.ref_name == 'production'
    needs: [snyk-sca, snyk-code]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk IaC
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk iac test --sarif-file-output=snyk-iac.sarif --severity-threshold=high

      - name: Check SARIF was generated
        if: always()
        id: check_sarif
        run: |
          if [ -f "snyk-iac.sarif" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload IaC results to GitHub Code Scanning
        if: always() && steps.check_sarif.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac

  
  snyk-dast:
    if: github.ref_name == 'uat' || github.ref_name == 'staging' || github.ref_name == 'production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Application Stack via Docker Compose
        run: |
          docker compose up -d --build
          sleep 20 # Wait for application services to spin up

      - name: Start Snyk Scanning Agent
        run: |
          if [ -z "${{ secrets.SNYK_AGENT_TOKEN }}" ]; then
            echo "::error::SNYK_AGENT_TOKEN secret is missing or empty!"
            exit 1
          fi

          # 1. Get Docker network ID for labnet
          LABNET_ID=$(docker network ls --filter name=labnet -q | head -n 1)

          # 2. Extract Gateway IP inside labnet dynamically
          GATEWAY_IP=$(docker inspect $(docker compose ps -q gateway) -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')

          echo "Gateway IP inside Docker network: $GATEWAY_IP"

          # 3. Run Agent attached to labnet with host mapping
          docker run -d \
            --name probely-agent \
            --cap-add NET_ADMIN \
            --device /dev/net/tun \
            --network "$LABNET_ID" \
            --add-host gateway:$GATEWAY_IP \
            -e FARCASTER_AGENT_TOKEN="${{ secrets.SNYK_AGENT_TOKEN }}" \
            -e FARCASTER_API_URL="https://api.au.probely.com" \
            probely/farcaster-onprem-agent:v3

          echo "Waiting 30 seconds for agent connection..."
          sleep 30

          echo "--- Agent Status Logs ---"
          docker logs probely-agent --tail 25

      - name: Trigger Snyk/Probely DAST Scan
        id: trigger_scan
        run: |
          if [ -z "${{ secrets.SNYK_TARGET_ID }}" ] || [ -z "${{ secrets.SNYK_DAST_API_KEY }}" ]; then
            echo "::error::SNYK_TARGET_ID or SNYK_DAST_API_KEY secret is missing!"
            exit 1
          fi

          # Trigger scan via Australian Regional Endpoint
          RESPONSE=$(curl -s -L -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.au.probely.com/targets/${{ secrets.SNYK_TARGET_ID }}/scan_now/" \
            -H "Authorization: JWT ${{ secrets.SNYK_DAST_API_KEY }}" \
            -H "Content-Type: application/json")

          JSON_BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//g')
          SCAN_ID=$(echo "$JSON_BODY" | jq -r '.id // empty')

          if [ -z "$SCAN_ID" ]; then
            echo "::error::Failed to retrieve Scan ID from DAST API!"
            exit 1
          fi

          echo "Started Scan ID: $SCAN_ID"
          echo "scan_id=$SCAN_ID" >> "$GITHUB_OUTPUT"

          # Poll scan completion
          echo "Waiting for DAST scan to complete..."
          while true; do
            STATUS_RESP=$(curl -s -L -H "Authorization: JWT ${{ secrets.SNYK_DAST_API_KEY }}" "https://api.au.probely.com/scans/$SCAN_ID/")
            STATUS=$(echo "$STATUS_RESP" | jq -r '.status // empty')

            echo "Current scan status: $STATUS"

            if [ "$STATUS" == "completed" ] || [ "$STATUS" == "finished" ]; then
              echo "Scan completed successfully!"
              break
            elif [ "$STATUS" == "failed" ] || [ "$STATUS" == "cancelled" ]; then
              echo "Scan finished with status: $STATUS"
              break
            fi

            sleep 15
          done

      - name: Fetch Findings and Convert to SARIF
        if: always()
        run: |
          echo "Fetching findings from Probely API..."
          curl -s "https://api.au.probely.com/targets/${{ secrets.SNYK_TARGET_ID }}/findings/" \
            -H "Authorization: JWT ${{ secrets.SNYK_DAST_API_KEY }}" \
            > raw-findings.json

          # Ensure we are working with an array
          jq 'if type == "object" and .results then .results else . end' raw-findings.json > findings.json

          # Convert to valid SARIF schema forcing all IDs to strings
          jq '{
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            version: "2.1.0",
            runs: [
              {
                tool: {
                  driver: {
                    name: "Snyk API & Web (DAST)",
                    informationUri: "https://probely.com",
                    rules: [
                      (.[]? | {
                        id: ((.id // "unknown") | tostring),
                        name: (.definition.name // "Unknown finding"),
                        shortDescription: { text: (.definition.name // "Unknown finding") },
                        fullDescription: { text: (.definition.description // "") },
                        properties: {}
                      })
                    ] | unique_by(.id)
                  }
                },
                results: [
                  (.[]? | {
                    ruleId: ((.id // "unknown") | tostring),
                    level: (
                      if .severity == "high" then "error"
                      elif .severity == "medium" then "warning"
                      else "note"
                      end
                    ),
                    message: { text: "Endpoint: \(.url // "N/A")\n\n\((.definition.description // .definition.name // "No description"))" },
                    locations: [
                      {
                        physicalLocation: {
                          artifactLocation: { uri: "docker-compose.yml" }
                        }
                      }
                    ]
                  })
                ]
              }
            ]
          }' findings.json > snyk-dast.sarif

          echo "--- Validating Generated SARIF ---"
          jq empty snyk-dast.sarif && echo "SARIF JSON is well-formed!"

      - name: Upload DAST results to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-dast.sarif
          category: snyk-dast

      - name: Tear Down Stack and Agent
        if: always()
        run: |
          docker stop probely-agent || true
          docker rm probely-agent || true
          docker compose down -v 
  # ===========================================================================
  # STAGING PHASE — runs on push to `staging`. Gated behind environment.
  # ===========================================================================
  staging-gate:
    if: github.ref_name == 'staging'
    needs: [snyk-sca, snyk-code, snyk-container, snyk-iac, snyk-dast]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Staging gate passed
        run: echo "All scans passed — staging environment approval satisfied."

  # ===========================================================================
  # PRODUCTION PHASE — runs on push to `production`. Gated behind environment.
  # ===========================================================================
  production-gate:
    if: github.ref_name == 'production'
    needs: [snyk-sca, snyk-code, snyk-container, snyk-iac, snyk-dast]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Production gate passed
        run: echo "All scans passed — production environment approval satisfied."
