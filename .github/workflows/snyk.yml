name: Snyk Security Scan

# ---------------------------------------------------------------------------
# PHASE MODEL
#
# DEV        -> pull_request into main. Fast feedback: SCA + SAST only,
#               hard gate (blocks merge via branch Ruleset).
# UAT        -> push to the `uat` branch. Full suite: SCA + SAST + Container
#               + IaC, hard gate.
# STAGING    -> push to the `staging` branch. Full suite again, gated behind
#               the `staging` GitHub Environment (configure required
#               reviewers there if you want a manual check before this runs).
# PRODUCTION -> push to the `production` branch. Full suite again, gated
#               behind the `production` Environment — configure required
#               reviewers there; this is your last human checkpoint.
#
# DAST (Snyk API & Web) is intentionally NOT in this file — it needs a live
# deployed URL, so it belongs in snyk-dast.yml, triggered after an actual
# staging/production deployment succeeds, not here.
# ---------------------------------------------------------------------------

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, uat, staging, production]
  schedule:
    - cron: "0 3 * * 1"   # weekly Monday scan, catches newly disclosed vulns

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ===========================================================================
  # DEV PHASE — runs on every PR into main. SCA + SAST only, for fast feedback.
  # ===========================================================================
  snyk-sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up runtimes for all detected ecosystems
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Scan every service directory (auto-detected by manifest file)
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e   # keep looping across services even if one fails; we fail the job at the end
          OVERALL_EXIT=0
          mkdir -p sarif-output

          # Find every directory (repo root included) containing a recognized
          # manifest file, then scan it with the right install + snyk command.
          for manifest in $(find . -maxdepth 2 \
              \( -name "package.json" -o -name "requirements.txt" \
                 -o -name "pom.xml" -o -name "build.gradle" \
                 -o -name "composer.json" -o -name "*.csproj" \) \
              -not -path "*/node_modules/*"); do

            dir=$(dirname "$manifest")
            service=$(basename "$dir")
            [ "$dir" = "." ] && service="root"

            echo "=================================================="
            echo "Scanning service: $service (in $dir)"
            echo "=================================================="

            pushd "$dir" > /dev/null

            case "$manifest" in
              *package.json)
                npm install --no-audit --no-fund
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *requirements.txt)
                pip install -r requirements.txt --break-system-packages --quiet
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *pom.xml)
                mvn install -DskipTests -q
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *build.gradle)
                gradle build -x test
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *composer.json)
                composer install --no-interaction
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
              *.csproj)
                dotnet restore
                snyk test --sarif-file-output="../sarif-output/snyk-sca-${service}.sarif" --severity-threshold=high
                ;;
            esac

            EXIT_CODE=$?
            [ $EXIT_CODE -ne 0 ] && OVERALL_EXIT=1
            echo "Exit code for $service: $EXIT_CODE"

            popd > /dev/null
          done

          echo "overall_exit=$OVERALL_EXIT" >> "$GITHUB_OUTPUT"
          exit $OVERALL_EXIT

      - name: Upload SCA results per service to GitHub Code Scanning
        if: always()
        run: |
          for f in sarif-output/*.sarif; do
            [ -f "$f" ] && echo "Found: $f"
          done

      - name: Upload snyk-sca SARIF files
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-output
          category: snyk-sca

  snyk-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk Code
        uses: snyk/actions/node@master
        # DEV GATE: same reasoning as snyk-sca above.
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif --severity-threshold=high

      - name: Upload Code results to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

  # ===========================================================================
  # UAT PHASE — runs on push to the `uat` branch. Adds Container + IaC on top
  # of the same SCA/SAST checks, still a hard gate (no environment/reviewer
  # step yet — UAT is typically an automated promotion, not a human gate).
  # ===========================================================================
  snyk-container:
    if: github.ref_name == 'uat' || github.ref_name == 'staging' || github.ref_name == 'production'
    needs: [snyk-sca, snyk-code]   # visually chains UAT after the Dev stage in the Actions graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found — skipping container scan."
          fi

      - name: Build image
        if: steps.check_dockerfile.outputs.found == 'true'
        run: docker build -t myapp:${{ github.sha }} .

      - name: Run Snyk Container
        if: steps.check_dockerfile.outputs.found == 'true'
        uses: snyk/actions/docker@master
        # UAT GATE: no continue-on-error — this now blocks promotion past UAT.
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: myapp:${{ github.sha }}
          args: --sarif-file-output=snyk-container.sarif --severity-threshold=high

      - name: Patch invalid security-severity values in SARIF
        if: steps.check_dockerfile.outputs.found == 'true' && always()
        run: |
          if [ -f "snyk-container.sarif" ]; then
            jq 'del(.. | objects | .["security-severity"]?)' snyk-container.sarif > snyk-container-fixed.sarif
            mv snyk-container-fixed.sarif snyk-container.sarif
          fi

      - name: Upload Container results to GitHub Code Scanning
        if: steps.check_dockerfile.outputs.found == 'true' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container

  snyk-iac:
    if: github.ref_name == 'uat' || github.ref_name == 'staging' || github.ref_name == 'production'
    needs: [snyk-sca, snyk-code]   # same stage as snyk-container — both run in parallel within UAT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk IaC
        # UAT GATE: no continue-on-error, no `|| true` — this now blocks.
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk iac test --sarif-file-output=snyk-iac.sarif --severity-threshold=high

      - name: Check SARIF was generated
        if: always()
        id: check_sarif
        run: |
          if [ -f "snyk-iac.sarif" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload IaC results to GitHub Code Scanning
        if: always() && steps.check_sarif.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac

  # ===========================================================================
  # STAGING PHASE — runs on push to `staging`. Same full suite, but gated
  # behind the `staging` GitHub Environment. Configure required reviewers on
  # that Environment (Settings -> Environments -> staging) if you want a
  # human check before this proceeds; otherwise it behaves like UAT.
  # ===========================================================================
  staging-gate:
    if: github.ref_name == 'staging'
    needs: [snyk-sca, snyk-code, snyk-container, snyk-iac]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Staging gate passed
        run: echo "All scans passed — staging environment approval satisfied."

  # ===========================================================================
  # PRODUCTION PHASE — runs on push to `production`. Gated behind the
  # `production` Environment. This should be your strictest required-reviewer
  # configuration — nothing should be discovering new Critical issues this
  # late; this is a final human checkpoint before release.
  # ===========================================================================
  production-gate:
    if: github.ref_name == 'production'
    needs: [snyk-sca, snyk-code, snyk-container, snyk-iac]   # all run within this same push-to-production event
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Production gate passed
        run: echo "All scans passed — production environment approval satisfied."
