apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-gateway
  namespace: polyglot-vuln-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-gateway
  template:
    metadata:
      labels:
        app: vulnerable-gateway
    spec:
      hostNetwork: true
      containers:
        - name: gateway
          image: node:16-bullseye
          imagePullPolicy: Always
          securityContext:
            privileged: true
            runAsUser: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab-secrets
                  key: database-password
          ports:
            - containerPort: 3000
              hostPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-gateway
  namespace: polyglot-vuln-lab
spec:
  type: NodePort
  selector:
    app: vulnerable-gateway
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
