parameters:
  - name: defaultBranch
    type: string
    default: main

jobs:
  - job: SecurityScan
    displayName: Semgrep security scan

    steps:
      - checkout: self
        clean: true
        fetchDepth: 0
        persistCredentials: true

      # ----------------------------------------------------------
      # Install Semgrep and prepare the output directory.
      # ----------------------------------------------------------
      - bash: |
          set -euo pipefail

          results_directory="$(Build.ArtifactStagingDirectory)/CodeAnalysisLogs"

          rm -rf "${results_directory}"
          mkdir -p "${results_directory}"

          echo "##vso[task.setvariable variable=SemgrepSarifReady]false"
          echo "##vso[task.setvariable variable=SemgrepSarifEnriched]false"

          python -m pip install --upgrade pip
          python -m pip install semgrep

          if [ -z "${SEMGREP_APP_TOKEN:-}" ]; then
            echo "ERROR: SEMGREP_APP_TOKEN is not available."
            echo "Check the Semgrep_Variables variable group."
            exit 1
          fi

          echo "Semgrep version:"
          semgrep --version
        displayName: Install and configure Semgrep
        env:
          SEMGREP_APP_TOKEN: $(SEMGREP_APP_TOKEN)

      # ----------------------------------------------------------
      # Full scan for normal feature-1 and main branch runs.
      # ----------------------------------------------------------
      - bash: |
          set -euo pipefail

          results_directory="$(Build.ArtifactStagingDirectory)/CodeAnalysisLogs"

          echo "Running Semgrep branch/full scan."
          echo "Build reason: ${BUILD_REASON}"
          echo "Source branch: ${BUILD_SOURCEBRANCH}"
          echo "Repository: ${SEMGREP_REPO_NAME}"
          echo "Commit: ${SEMGREP_COMMIT}"

          set +e

          semgrep ci \
            --no-suppress-errors \
            --json-output="${results_directory}/semgrep.json" \
            --sarif-output="${results_directory}/semgrep.sarif"

          semgrep_exit_code=$?

          set -e

          echo "Semgrep exit code: ${semgrep_exit_code}"

          if [ -s "${results_directory}/semgrep.json" ] && \
             [ -s "${results_directory}/semgrep.sarif" ]; then

            echo "Semgrep JSON and SARIF generated successfully."
            echo "##vso[task.setvariable variable=SemgrepSarifReady]true"
          else
            echo "ERROR: Semgrep output files were not generated."
            ls -la "${results_directory}"
            exit 1
          fi

          exit "${semgrep_exit_code}"
        displayName: Run Semgrep full scan
        condition: |
          and(
            succeeded(),
            ne(variables['Build.Reason'], 'PullRequest')
          )
        env:
          SEMGREP_APP_TOKEN: $(SEMGREP_APP_TOKEN)

          BUILD_REASON: $(Build.Reason)
          BUILD_SOURCEBRANCH: $(Build.SourceBranch)

          SEMGREP_REPO_NAME: 'testgwen/Test1/Test1'
          SEMGREP_REPO_URL: $(Build.Repository.Uri)
          SEMGREP_BRANCH: $(Build.SourceBranch)
          SEMGREP_COMMIT: $(Build.SourceVersion)
          SEMGREP_JOB_URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)

      # ----------------------------------------------------------
      # Diff-aware scan for PR validation runs.
      # ----------------------------------------------------------
      - bash: |
          set -euo pipefail

          results_directory="$(Build.ArtifactStagingDirectory)/CodeAnalysisLogs"

          echo "Running Semgrep PR scan."
          echo "Build reason: ${BUILD_REASON}"
          echo "Pull request ID: ${SEMGREP_PR_ID}"
          echo "Baseline reference: ${SEMGREP_BASELINE_REF}"
          echo "Repository: ${SEMGREP_REPO_NAME}"
          echo "Source branch: ${SEMGREP_BRANCH}"
          echo "Source commit: ${SEMGREP_COMMIT}"

          if [ -z "${SEMGREP_PR_ID:-}" ]; then
            echo "ERROR: Azure DevOps did not provide a pull request ID."
            exit 1
          fi

          if [ -z "${SEMGREP_COMMIT:-}" ]; then
            echo "ERROR: Azure DevOps did not provide the PR source commit."
            exit 1
          fi

          git fetch origin \
            "${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"

          set +e

          semgrep ci \
            --no-suppress-errors \
            --json-output="${results_directory}/semgrep.json" \
            --sarif-output="${results_directory}/semgrep.sarif"

          semgrep_exit_code=$?

          set -e

          echo "Semgrep exit code: ${semgrep_exit_code}"

          if [ -s "${results_directory}/semgrep.json" ] && \
             [ -s "${results_directory}/semgrep.sarif" ]; then

            echo "Semgrep PR JSON and SARIF generated successfully."
            echo "##vso[task.setvariable variable=SemgrepSarifReady]true"
          else
            echo "ERROR: Semgrep PR output files were not generated."
            ls -la "${results_directory}"
            exit 1
          fi

          exit "${semgrep_exit_code}"
        displayName: Run Semgrep PR scan
        condition: |
          and(
            succeeded(),
            eq(variables['Build.Reason'], 'PullRequest')
          )
        env:
          SEMGREP_APP_TOKEN: $(SEMGREP_APP_TOKEN)

          BUILD_REASON: $(Build.Reason)

          SEMGREP_PR_ID: $(System.PullRequest.PullRequestId)
          SEMGREP_BASELINE_REF: origin/${{ parameters.defaultBranch }}

          SEMGREP_REPO_NAME: 'testgwen/Test1/Test1'
          SEMGREP_REPO_URL: $(Build.Repository.Uri)
          SEMGREP_BRANCH: $(System.PullRequest.SourceBranch)
          SEMGREP_COMMIT: $(System.PullRequest.SourceCommitId)
          SEMGREP_JOB_URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)

          DEFAULT_BRANCH: ${{ parameters.defaultBranch }}

      # ----------------------------------------------------------
      # Convert Semgrep severity to Azure Advanced Security:
      #
      # Critical -> security-severity 9.5
      # High     -> security-severity 8.0
      # Medium   -> security-severity 5.0
      # Low      -> security-severity 2.0
      # ----------------------------------------------------------
      - bash: |
          set -euo pipefail

          results_directory="$(Build.ArtifactStagingDirectory)/CodeAnalysisLogs"
          semgrep_json="${results_directory}/semgrep.json"
          semgrep_sarif="${results_directory}/semgrep.sarif"

          echo "Enriching Semgrep SARIF with Azure security severity..."

          python - "${semgrep_json}" "${semgrep_sarif}" <<'PY'
          import json
          import sys
          from pathlib import Path

          json_path = Path(sys.argv[1])
          sarif_path = Path(sys.argv[2])

          severity_config = {
              "CRITICAL": {
                  "score": "9.5",
                  "level": "error",
                  "rank": 4,
              },
              "HIGH": {
                  "score": "8.0",
                  "level": "error",
                  "rank": 3,
              },
              # Older Semgrep severity equivalent.
              "ERROR": {
                  "score": "8.0",
                  "level": "error",
                  "rank": 3,
              },
              "MEDIUM": {
                  "score": "5.0",
                  "level": "warning",
                  "rank": 2,
              },
              # Older Semgrep severity equivalent.
              "WARNING": {
                  "score": "5.0",
                  "level": "warning",
                  "rank": 2,
              },
              "LOW": {
                  "score": "2.0",
                  "level": "note",
                  "rank": 1,
              },
              # Older Semgrep severity equivalent.
              "INFO": {
                  "score": "2.0",
                  "level": "note",
                  "rank": 1,
              },
          }

          with json_path.open("r", encoding="utf-8") as file:
              semgrep_data = json.load(file)

          with sarif_path.open("r", encoding="utf-8") as file:
              sarif_data = json.load(file)

          severity_by_rule = {}

          for finding in semgrep_data.get("results", []):
              rule_id = finding.get("check_id")
              extra = finding.get("extra", {})

              severity = extra.get("severity")

              if not severity:
                  metadata = extra.get("metadata", {})
                  severity = metadata.get("severity")

              if not rule_id or not severity:
                  continue

              severity = str(severity).upper()

              if severity not in severity_config:
                  print(
                      f"WARNING: Unknown severity {severity} "
                      f"for rule {rule_id}"
                  )
                  continue

              current = severity_by_rule.get(rule_id)

              if current is None:
                  severity_by_rule[rule_id] = severity
              elif (
                  severity_config[severity]["rank"]
                  > severity_config[current]["rank"]
              ):
                  severity_by_rule[rule_id] = severity

          enriched_rules = 0
          enriched_results = 0

          for run in sarif_data.get("runs", []):
              driver = run.get("tool", {}).get("driver", {})

              for rule in driver.get("rules", []):
                  rule_id = rule.get("id")
                  severity = severity_by_rule.get(rule_id)

                  if not severity:
                      continue

                  config = severity_config[severity]

                  properties = rule.setdefault("properties", {})
                  tags = properties.setdefault("tags", [])

                  if "security" not in tags:
                      tags.append("security")

                  properties["security-severity"] = config["score"]
                  properties["semgrep-severity"] = severity.lower()

                  default_configuration = rule.setdefault(
                      "defaultConfiguration",
                      {},
                  )
                  default_configuration["level"] = config["level"]

                  enriched_rules += 1

              for result in run.get("results", []):
                  rule_id = result.get("ruleId")
                  severity = severity_by_rule.get(rule_id)

                  if not severity:
                      continue

                  config = severity_config[severity]

                  result["level"] = config["level"]

                  properties = result.setdefault("properties", {})
                  properties["semgrep-severity"] = severity.lower()
                  properties["security-severity"] = config["score"]

                  enriched_results += 1

          with sarif_path.open("w", encoding="utf-8") as file:
              json.dump(sarif_data, file, indent=2)

          print(f"Enriched SARIF rules: {enriched_rules}")
          print(f"Enriched SARIF results: {enriched_results}")

          for rule_id, severity in sorted(severity_by_rule.items()):
              config = severity_config[severity]

              print(
                  f"{severity:8} "
                  f"score={config['score']} "
                  f"rule={rule_id}"
              )

          if enriched_results == 0:
              print(
                  "WARNING: No SARIF findings were enriched. "
                  "Check the Semgrep JSON and SARIF rule IDs."
              )
          PY

          python -m json.tool "${semgrep_sarif}" > /dev/null

          echo "SARIF severity enrichment completed successfully."
          echo "##vso[task.setvariable variable=SemgrepSarifEnriched]true"
        displayName: Map Semgrep severity to Azure severity
        condition: |
          and(
            always(),
            eq(variables['SemgrepSarifReady'], 'true')
          )

      # ----------------------------------------------------------
      # Publish enriched findings to Azure Advanced Security.
      # ----------------------------------------------------------
      - task: AdvancedSecurity-Publish@1
        displayName: Publish Semgrep to Advanced Security
        condition: |
          and(
            always(),
            eq(variables['SemgrepSarifEnriched'], 'true')
          )
        inputs:
          SarifsInputDirectory: '$(Build.ArtifactStagingDirectory)/CodeAnalysisLogs'
          Category: 'Semgrep'
          WaitForProcessing: true
          WaitForProcessingInterval: '5'
          WaitForProcessingTimeout: '180'

      # ----------------------------------------------------------
      # Publish the original JSON and enriched SARIF as an artifact.
      # ----------------------------------------------------------
      - task: PublishBuildArtifacts@1
        displayName: Publish Semgrep analysis artifact
        condition: |
          and(
            always(),
            eq(variables['SemgrepSarifReady'], 'true')
          )
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)/CodeAnalysisLogs'
          ArtifactName: 'CodeAnalysisLogs'
          publishLocation: 'Container'