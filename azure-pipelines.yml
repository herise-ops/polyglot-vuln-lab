# Azure DevOps pipeline for the Polyglot Vulnerable Web Lab
#
# FLOW:
#   feature-1 push -> Semgrep -> Docker Compose build -> Dev environment record
#   PR feature-1 -> main -> Semgrep PR validation only
#   main merge -> Semgrep -> Docker Compose build -> UAT
#              -> Staging approval -> Staging
#
# NOTES:
# - Smoke tests are intentionally not included.
# - Dev/UAT/Staging currently download and validate the artifact only.
# - Replace each simulated deploymentCommand after choosing a persistent
#   hosting platform such as Azure Container Apps, App Service, AKS, or a VM.

name: $(Date:yyyyMMdd).$(Rev:r)

trigger:
  branches:
    include:
      - feature-1
      - main

pool:
  vmImage: ubuntu-latest

variables:
  # Must contain the secret SEMGREP_APP_TOKEN.
  - group: Semgrep_Variables

  - name: artifactName
    value: application

stages:
  # ------------------------------------------------------------
  # 1. SECURITY VALIDATION
  # ------------------------------------------------------------
  - stage: Validate
    displayName: Semgrep security validation
    jobs:
      - template: templates/security-scan.yml
        parameters:
          defaultBranch: main

  # ------------------------------------------------------------
  # 2. BUILD ALL DOCKER COMPOSE SERVICES
  # Skipped during Azure Repos pull-request validation.
  # ------------------------------------------------------------
  - stage: Build
    displayName: Build services and publish artifact
    dependsOn: Validate
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - template: templates/build-artifact.yml
        parameters:
          artifactName: application
          buildCommand: |
            echo "Validating docker-compose.yml..."
            docker compose config

            echo "Building all service images..."
            docker compose build

  # ------------------------------------------------------------
  # 3. FEATURE-1 -> DEV
  # ------------------------------------------------------------
  - stage: DeployDev
    displayName: Deploy feature-1 artifact to Dev
    dependsOn: Build
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/feature-1')
      )
    jobs:
      - template: templates/deploy-environment.yml
        parameters:
          jobName: DeployDevApplication
          environmentName: Dev
          artifactName: application
          deploymentCommand: |
            cd "$(Pipeline.Workspace)/application"

            echo "The Dev deployment artifact was downloaded."
            echo "No persistent Dev hosting target is configured yet."
            echo "Services contained in docker-compose.yml:"
            docker compose config --services

  # ------------------------------------------------------------
  # 4. MAIN -> UAT
  # ------------------------------------------------------------
  - stage: DeployUAT
    displayName: Deploy main artifact to UAT
    dependsOn: Build
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - template: templates/deploy-environment.yml
        parameters:
          jobName: DeployUATApplication
          environmentName: UAT
          artifactName: application
          deploymentCommand: |
            cd "$(Pipeline.Workspace)/application"

            echo "The UAT deployment artifact was downloaded."
            echo "No persistent UAT hosting target is configured yet."
            echo "Services contained in docker-compose.yml:"
            docker compose config --services

  # ------------------------------------------------------------
  # 5. UAT -> STAGING
  # Configure approval under:
  # Pipelines > Environments > Staging > Approvals and checks
  # ------------------------------------------------------------
  - stage: DeployStaging
    displayName: Promote UAT-approved artifact to Staging
    dependsOn: DeployUAT
    condition: succeeded()
    jobs:
      - template: templates/deploy-environment.yml
        parameters:
          jobName: DeployStagingApplication
          environmentName: Staging
          artifactName: application
          deploymentCommand: |
            cd "$(Pipeline.Workspace)/application"

            echo "The same pipeline artifact used by UAT was downloaded."
            echo "No persistent Staging hosting target is configured yet."
            echo "Services contained in docker-compose.yml:"
            docker compose config --services